<div #container class="container mx-auto px-6 relative z-30 -mt-8 md:-mt-16">
    <div
        class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] shadow-[0_20px_40px_-12px_rgba(0,0,0,0.06)] py-8 px-4 md:py-14 md:px-6 border border-slate-100">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 divide-x divide-slate-100">
            <div *ngFor="let stat of stats; let idx = index" class="text-center px-2 md:px-4">
                <div class="text-2xl md:text-6xl font-black text-slate-900 mb-1 md:mb-3 transition-all duration-1000"
                    [ngClass]="isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 md:translate-y-8'"
                    [style.transitionDelay]="(idx * 100) + 'ms'">
                    <span class="text-blue-600">{{ stat.value }}</span>{{ stat.suffix }}
                </div>
                <p class="text-slate-400 font-bold uppercase tracking-[0.15em] text-[8px] md:text-[10px]">
                    {{ stat.label }}
                </p>
            </div>
        </div>
    </div>
</div>
