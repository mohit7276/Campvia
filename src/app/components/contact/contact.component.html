<section id="contact" class="py-16 md:py-24 bg-slate-900 relative overflow-hidden">
    <div
        class="absolute top-0 right-0 w-64 md:w-96 h-64 md:h-96 bg-blue-600/10 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl">
    </div>

    <div class="container mx-auto px-6 relative z-10">
        <div class="flex flex-col lg:flex-row gap-12 md:gap-16">
            <div class="lg:w-2/5">
                <h4 class="text-blue-400 font-bold tracking-widest uppercase text-[10px] md:text-sm mb-3 md:mb-4">
                    Connect With Us</h4>
                <h2 class="text-3xl md:text-5xl font-serif text-white mb-6 md:mb-8 leading-tight">Let's Discuss Your
                    Future.</h2>
                <p class="text-slate-400 text-base md:text-lg mb-8 md:mb-10 leading-relaxed">
                    Have questions about our programs? Our academic advisors are here to help.
                </p>

                <div class="space-y-6 md:space-y-8">
                    <div class="flex items-center space-x-4 md:space-x-6">
                        <div
                            class="w-12 h-12 md:w-14 md:h-14 bg-white/5 rounded-xl md:rounded-2xl flex items-center justify-center text-blue-400">
                            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                                </path>
                            </svg>
                        </div>
                        <div>
                            <h5 class="text-slate-400 text-[9px] md:text-sm font-medium uppercase tracking-wider">Phone
                            </h5>
                            <p class="text-white font-bold text-base md:text-lg">+1 (555) 123-4567</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4 md:space-x-6">
                        <div
                            class="w-12 h-12 md:w-14 md:h-14 bg-white/5 rounded-xl md:rounded-2xl flex items-center justify-center text-blue-400">
                            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                </path>
                            </svg>
                        </div>
                        <div>
                            <h5 class="text-slate-400 text-[9px] md:text-sm font-medium uppercase tracking-wider">Email
                            </h5>
                            <p class="text-white font-bold text-base md:text-lg">admissions@campvia.edu</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-3/5">
                <div class="bg-white rounded-[1.5rem] md:rounded-3xl p-6 md:p-12 shadow-2xl">
                    <form class="space-y-5 md:space-y-6" (ngSubmit)="submitForm()" #contactForm="ngForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                            <div>
                                <label class="block text-slate-700 font-bold text-[11px] md:text-sm mb-1.5 md:mb-2">Full
                                    Name</label>
                                <input type="text" placeholder="John Doe" [(ngModel)]="name" name="name" required
                                    class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 md:px-5 md:py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label
                                    class="block text-slate-700 font-bold text-[11px] md:text-sm mb-1.5 md:mb-2">Email</label>
                                <input type="email" placeholder="john@example.com" [(ngModel)]="email" name="email" required
                                    class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 md:px-5 md:py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-slate-700 font-bold text-[11px] md:text-sm mb-1.5 md:mb-2">Your
                                Message</label>
                            <textarea rows="4" placeholder="How can we help?" [(ngModel)]="message" name="message" required
                                class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 md:px-5 md:py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"></textarea>
                        </div>

                        <!-- Feedback messages -->
                        <div *ngIf="errorMsg" class="text-red-600 text-sm font-medium bg-red-50 rounded-xl px-4 py-3">
                            {{ errorMsg }}
                        </div>
                        <div *ngIf="successMsg" class="text-green-700 text-sm font-medium bg-green-50 rounded-xl px-4 py-3 flex items-center gap-2">
                            <svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7" />
                            </svg>
                            {{ successMsg }}
                        </div>

                        <button type="submit" [disabled]="isSending"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 md:py-5 rounded-xl md:rounded-2xl shadow-xl transition-all text-sm disabled:opacity-60">
                            {{ isSending ? 'Sending...' : 'Send Inquiry' }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
