<div *ngIf="isOpen" class="fixed inset-0 z-[100] flex items-center justify-center px-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" (click)="close.emit()"></div>

    <!-- Modal Card -->
    <div
        class="relative bg-white w-full max-w-[400px] rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.2)] animate-[scaleUp_0.3s_cubic-bezier(0.16,1,0.3,1)]">
        <div class="p-6 md:p-8">
            <div class="flex justify-between items-center mb-4 md:mb-6">
                <img src="/logo.png" alt="Campvia Logo" class="h-10 w-10 object-cover rounded-xl" />
                <button (click)="close.emit()" class="p-2 text-slate-400 hover:text-slate-900 transition-colors"
                    title="Close modal" aria-label="Close modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="mb-4 md:mb-5">
                <h2 class="text-xl md:text-2xl font-serif font-bold text-slate-900 leading-tight">
                    {{ mode === 'login' ? 'Welcome Back' : 'Join Campvia' }}
                </h2>
                <p class="text-slate-500 text-xs mt-1">Access your academic portal</p>
            </div>

            <!-- Tab Switcher -->
            <div class="flex bg-slate-100 p-1 rounded-xl mb-5 md:mb-6">
                <button (click)="setMode('login')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all"
                    [ngClass]="mode === 'login' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400 hover:text-slate-600'">
                    Login
                </button>
                <button (click)="setMode('register')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all"
                    [ngClass]="mode === 'register' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400 hover:text-slate-600'">
                    Register
                </button>
            </div>

            <!-- Error Message Alert -->
            <div *ngIf="errorMessage"
                class="mb-5 bg-red-50/80 border border-red-100 text-red-600 px-4 py-3 rounded-xl flex items-center space-x-3 animate-[fadeIn_0.3s_ease-out]">
                <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-widest">{{ errorMessage }}</p>
            </div>

            <!-- Role Switcher (Only for login) -->
            <div *ngIf="mode === 'login'" class="flex justify-center space-x-2 mb-5 animate-[fadeIn_0.2s_ease-out]">
                <button type="button" (click)="setRole('student')"
                    class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all"
                    [ngClass]="role === 'student' ? 'bg-blue-100 text-blue-700' : 'text-slate-400 hover:bg-slate-50 hover:text-slate-600'">
                    Student
                </button>
                <button type="button" (click)="setRole('faculty')"
                    class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all"
                    [ngClass]="role === 'faculty' ? 'bg-blue-100 text-blue-700' : 'text-slate-400 hover:bg-slate-50 hover:text-slate-600'">
                    Faculty
                </button>
                <button type="button" (click)="setRole('admin')"
                    class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all"
                    [ngClass]="role === 'admin' ? 'bg-blue-100 text-blue-700' : 'text-slate-400 hover:bg-slate-50 hover:text-slate-600'">
                    Admin
                </button>
            </div>

            <form class="space-y-3 md:space-y-4" (submit)="handleSubmit(); $event.preventDefault()">
                <div *ngIf="mode === 'register'" class="animate-[fadeIn_0.2s_ease-out]">
                    <label class="block text-slate-600 font-bold text-[9px] uppercase tracking-widest mb-1 ml-1">Full
                        Name</label>
                    <input type="text" name="name" [(ngModel)]="name" required placeholder="Enter full name"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                </div>

                <div>
                    <label class="block text-slate-600 font-bold text-[9px] uppercase tracking-widest mb-1 ml-1">
                        Portal ID / Email
                    </label>
                    <input type="text" name="email" [(ngModel)]="email" required placeholder="id@campvia.edu"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1 ml-1">
                        <label
                            class="block text-slate-600 font-bold text-[9px] uppercase tracking-widest">Password</label>
                        <button *ngIf="mode === 'login'" type="button"
                            class="text-[9px] text-blue-600 font-bold uppercase">Forgot?</button>
                    </div>
                    <input type="password" name="password" [(ngModel)]="password" required placeholder="••••••••"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 mt-2 text-xs tracking-widest uppercase flex items-center justify-center"
                    [ngClass]="isLoading ? 'opacity-70 cursor-not-allowed' : ''">
                    <ng-container *ngIf="isLoading; else btnText">
                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </ng-container>
                    <ng-template #btnText>
                        {{ mode === 'login' ? 'Login' : 'Create Account' }}
                    </ng-template>
                </button>
            </form>

            <div class="mt-6 md:mt-8">
                <div class="relative mb-5">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-100"></div>
                    </div>
                    <div class="relative flex justify-center text-[9px]">
                        <span class="px-3 bg-white text-slate-400 uppercase tracking-widest">Or login with</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button
                        class="flex items-center justify-center py-2.5 border border-slate-100 rounded-xl hover:bg-slate-50 transition-all">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4 mr-2"
                            alt="Google" />
                        <span class="text-[10px] font-bold text-slate-700">Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center py-2.5 border border-slate-100 rounded-xl hover:bg-slate-50 transition-all">
                        <img src="https://www.svgrepo.com/show/448234/linkedin.svg" class="w-4 h-4 mr-2"
                            alt="LinkedIn" />
                        <span class="text-[10px] font-bold text-slate-700">LinkedIn</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
