<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" [ngClass]="{
       'glass shadow-[0_8px_30px_rgb(0,0,0,0.04)] py-4': scrolled, 
       'bg-transparent py-6 md:py-8': !scrolled
     }">
    <div class="container mx-auto px-6 flex justify-between items-center">
        <div class="flex items-center space-x-3 group cursor-pointer" (click)="handleHomeClick()">
            <img src="/logo.png" alt="Campvia Logo"
                class="h-10 w-10 object-cover rounded-xl group-hover:scale-105 transition-transform drop-shadow-md" />
            <span class="text-xl md:text-2xl font-extrabold tracking-tighter"
                [ngClass]="scrolled ? 'text-slate-900' : 'text-white'">
                CAMPVIA
            </span>
        </div>

        <!-- Desktop Nav -->
        <div class="hidden lg:flex items-center space-x-10">
            <div class="flex items-center space-x-8">
                <a *ngFor="let link of navLinks" [href]="link.href" (click)="handleHomeClick()"
                    class="text-sm font-semibold tracking-tight transition-all relative after:content-[''] after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-blue-600 after:transition-all hover:after:w-full hover:text-blue-500"
                    [ngClass]="scrolled ? 'text-slate-700' : 'text-white/90'">
                    {{ link.name }}
                </a>
            </div>

            <div class="flex items-center pl-4 border-l border-slate-200/20 space-x-4">
                <ng-container *ngIf="isLoggedIn; else loginBlock">
                    <div class="flex items-center space-x-4">
                        <button (click)="handleDashboardClick()"
                            class="px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest transition-all duration-300 transform hover:scale-105 hover:shadow-xl"
                            [ngClass]="scrolled ? 'bg-slate-900 text-white hover:bg-slate-800' : 'bg-white text-slate-900 hover:bg-slate-50 shadow-xl'">
                            {{ userRole === 'admin' ? 'Admin' : userRole === 'faculty' ? 'Faculty' : 'Dashboard' }}
                        </button>
                        <button (click)="handleLogout()"
                            class="text-[10px] font-bold uppercase tracking-widest transition-colors"
                            [ngClass]="scrolled ? 'text-slate-500 hover:text-red-500' : 'text-white/60 hover:text-white'">
                            Logout
                        </button>
                    </div>
                </ng-container>
                <ng-template #loginBlock>
                    <button (click)="handleAuthClick('login')"
                        class="px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest transition-all duration-300 transform hover:scale-105 hover:shadow-xl"
                        [ngClass]="scrolled ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/20' : 'bg-white text-blue-600 hover:bg-blue-50 shadow-xl'">
                        Log In
                    </button>
                </ng-template>
            </div>
        </div>

        <!-- Mobile Toggle -->
        <button type="button" [attr.aria-label]="isOpen ? 'Close navigation menu' : 'Open navigation menu'"
            class="lg:hidden w-10 h-10 flex flex-col justify-center items-center space-y-1.5" (click)="toggleMenu()">
            <div class="w-6 h-[2px] rounded-full transition-all duration-300"
                [ngClass]="{'rotate-45 translate-y-2': isOpen, 'bg-slate-900': scrolled, 'bg-white': !scrolled}"></div>
            <div class="w-6 h-[2px] rounded-full transition-all duration-300"
                [ngClass]="{'opacity-0': isOpen, 'opacity-100': !isOpen, 'bg-slate-900': scrolled, 'bg-white': !scrolled}">
            </div>
            <div class="w-6 h-[2px] rounded-full transition-all duration-300"
                [ngClass]="{'-rotate-45 -translate-y-2': isOpen, 'bg-slate-900': scrolled, 'bg-white': !scrolled}">
            </div>
        </button>
    </div>

    <!-- Mobile Menu -->
    <div class="lg:hidden absolute top-0 left-0 w-full h-screen bg-white transition-all duration-500 ease-in-out z-[-1] flex flex-col pt-24"
        [ngClass]="isOpen ? 'opacity-100 translate-y-0 pointer-events-auto' : 'opacity-0 -translate-y-full pointer-events-none'">
        <div class="flex flex-col items-center space-y-6 px-10">
            <a *ngFor="let link of navLinks" [href]="link.href" (click)="handleHomeClick()"
                class="text-2xl font-black text-slate-900 hover:text-blue-600 transition-colors">
                {{ link.name }}
            </a>
            <div class="w-full h-[1px] bg-slate-100 my-4"></div>
            <ng-container *ngIf="isLoggedIn; else mobileLogin">
                <div class="w-full flex flex-col space-y-4">
                    <button (click)="handleDashboardClick()"
                        class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black tracking-widest uppercase text-sm shadow-xl">
                        {{ userRole === 'admin' ? 'Admin' : userRole === 'faculty' ? 'Faculty' : 'Dashboard' }}
                    </button>
                    <button (click)="handleLogout()"
                        class="w-full text-slate-400 font-bold uppercase tracking-widest text-xs">
                        Logout Account
                    </button>
                </div>
            </ng-container>
            <ng-template #mobileLogin>
                <button (click)="handleAuthClick('login')"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black tracking-widest uppercase text-sm shadow-xl shadow-blue-600/20">
                    Log In
                </button>
            </ng-template>
        </div>
    </div>
</nav>
